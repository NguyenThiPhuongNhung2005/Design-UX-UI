<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900" role="img" aria-label="Happy pets illustration">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f7fbff"/>
    </linearGradient>
    <linearGradient id="blob" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#d9e6ff"/>
      <stop offset="1" stop-color="#c7dcff"/>
    </linearGradient>
    <linearGradient id="y" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffe27a"/>
      <stop offset="1" stop-color="#ffd23c"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0b1220" flood-opacity="0.18"/>
    </filter>
  </defs>

  <path d="M220 500c-92-150-10-340 164-378 174-38 316 60 356 176 40 116 188 118 200 252 12 134-92 244-232 280-140 36-230 150-386 96-156-54-50-266-102-426z" fill="url(#blob)"/>
  <rect x="120" y="130" width="660" height="660" rx="84" fill="url(#bg)" stroke="#0f172a" stroke-opacity="0.10" stroke-width="6" filter="url(#shadow)"/>

  <!-- two pets side-by-side -->
  <g transform="translate(190 320)">
    <!-- dog -->
    <path d="M40 160c0-78 64-142 142-142h66c78 0 142 64 142 142v116c0 80-64 144-144 144H184c-80 0-144-64-144-144V160z" fill="#1f2430"/>
    <circle cx="172" cy="200" r="30" fill="#fff" opacity="0.95"/>
    <circle cx="292" cy="200" r="30" fill="#fff" opacity="0.95"/>
    <circle cx="172" cy="200" r="11" fill="#0b1220"/>
    <circle cx="292" cy="200" r="11" fill="#0b1220"/>
    <path d="M220 240c0 16 28 16 28 0 0-16-28-16-28 0z" fill="#0b1220" opacity="0.85"/>
    <path d="M194 272c22 18 58 18 80 0" fill="none" stroke="#0b1220" stroke-opacity="0.55" stroke-width="10" stroke-linecap="round"/>
    <circle cx="134" cy="244" r="12" fill="url(#y)" opacity="0.85"/>
    <circle cx="330" cy="244" r="12" fill="url(#y)" opacity="0.85"/>

    <!-- cat -->
    <g transform="translate(360 40)">
      <path d="M34 190c0-62 50-112 112-112s112 50 112 112c0 40-20 76-54 96v92c0 22-18 40-40 40H128c-22 0-40-18-40-40v-92c-34-20-54-56-54-96z" fill="#2a2f3a"/>
      <path d="M74 120 42 86v70" fill="#2a2f3a"/>
      <path d="M218 120 250 86v70" fill="#2a2f3a"/>
      <circle cx="106" cy="194" r="24" fill="#fff" opacity="0.95"/>
      <circle cx="186" cy="194" r="24" fill="#fff" opacity="0.95"/>
      <circle cx="106" cy="194" r="8" fill="#0b1220"/>
      <circle cx="186" cy="194" r="8" fill="#0b1220"/>
      <path d="M142 220c0 10 18 10 18 0 0-10-18-10-18 0z" fill="url(#y)"/>
    </g>
  </g>

  <g fill="none" stroke="#0b1220" stroke-opacity="0.22" stroke-width="8" stroke-linecap="round">
    <path d="M184 236h44"/>
    <path d="M206 214v44"/>
  </g>
</svg>
